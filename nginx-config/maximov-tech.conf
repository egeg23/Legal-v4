server {
    listen 80;
    server_name maximov-tech.ru www.maximov-tech.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maximov-tech.ru www.maximov-tech.ru;

    ssl_certificate /etc/letsencrypt/live/maximov-tech.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maximov-tech.ru/privkey.pem;

    root /var/www/maximov-tech;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /legal {
        alias /var/www/legal-ai-simple/public;
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirect old /legal-ai/ URLs to /legal/
    location /legal-ai/ {
        return 301 /legal/;
    }

    # Proxy API requests to Flask backend
    location /legal/api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }

    # Also handle /api/ requests from root
    location /api/ {
        rewrite ^/api/v1/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 404 /404.html;
}

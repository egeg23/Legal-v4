<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Legal AI</title>
    <meta name="description" content="Создайте аккаунт Legal AI и начните использовать AI-юриста.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <div class="logo-icon">L</div>
                    <span>Legal AI</span>
                </a>
                <nav class="nav">
                    <a href="about.html" class="nav-link">О сервисе</a>
                    <a href="pricing.html" class="nav-link">Стоимость</a>
                    <a href="dashboard.html" class="nav-link">Личный кабинет</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <div class="logo-icon" style="width: 56px; height: 56px; font-size: 1.5rem; margin: 0 auto;">L</div>
                </div>

                <h1 class="auth-title">Создать аккаунт</h1>
                <p class="auth-subtitle">Зарегистрируйтесь, чтобы начать работу</p>

                <!-- Register Form -->
                <form id="registerForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="your@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Пароль</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Придумайте надёжный пароль"
                            required
                            autocomplete="new-password"
                            minlength="8"
                        >
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">
                            Минимум 8 символов, включая буквы и цифры
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            class="form-input" 
                            placeholder="Повторите пароль"
                            required
                            autocomplete="new-password"
                        >
                    </div>

                    <div style="margin-bottom: 24px;">
                        <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.875rem; color: var(--text-secondary);">
                            <input type="checkbox" name="agree" required style="width: 16px; height: 16px; margin-top: 2px;">
                            <span>
                                Я согласен с <a href="privacy.html" target="_blank">Политикой конфиденциальности</a> 
                                и принимаю <a href="#" target="_blank">Условия использования</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        Зарегистрироваться
                    </button>
                </form>

                <!-- Divider -->
                <div style="display: flex; align-items: center; margin: 24px 0;">
                    <div style="flex: 1; height: 1px; background-color: var(--border-light);"></div>
                    <span style="padding: 0 16px; color: var(--text-muted); font-size: 0.875rem;">или</span>
                    <div style="flex: 1; height: 1px; background-color: var(--border-light);"></div>
                </div>

                <!-- Social Login -->
                <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                    <button type="button" class="btn btn-secondary btn-block" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="btn btn-secondary btn-block" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#0077FF">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                        </svg>
                        Telegram
                    </button>
                </div>

                <!-- Footer -->
                <div class="auth-footer">
                    Уже есть аккаунт? <a href="login.html">Войти</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="about.html" class="footer-link">О сервисе</a>
                    <a href="pricing.html" class="footer-link">Стоимость</a>
                    <a href="privacy.html" class="footer-link">Политика конфиденциальности</a>
                </div>
                <p class="footer-copyright">© 2024 Legal AI. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>

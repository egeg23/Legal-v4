<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генерация документов — Legal AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .cases-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .case-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .case-item:hover {
            border-color: rgba(102, 126, 234, 0.5);
        }
        .case-item.completed {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        .case-item.failed {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .case-info h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .case-info .status {
            font-size: 0.9em;
            opacity: 0.7;
        }
        .case-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success-banner {
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .error-banner {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .download-all {
            margin-top: 30px;
            text-align: center;
        }
        .download-all .btn {
            font-size: 1.1em;
            padding: 15px 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Генерация документов</h1>
            <p id="statusText">Подготовка...</p>
        </div>

        <div id="progressContainer" class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="progressText">Загрузка...</p>
        </div>

        <div id="casesList" class="cases-list"></div>

        <div id="downloadAllContainer" class="download-all" style="display: none;">
            <button class="btn btn-primary" onclick="downloadAllDocuments()">
                📦 Скачать все документы
            </button>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/legal/?v=230" class="btn btn-secondary">← Новый запрос</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://maximov-tech.ru/legal/api';
        
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const caseIds = urlParams.get('cases') ? urlParams.get('cases').split(',') : [];
        const token = urlParams.get('token') || localStorage.getItem('token');
        
        // Load pending cases from localStorage
        let pendingCases = [];
        try {
            const stored = localStorage.getItem('pending_cases');
            if (stored) {
                pendingCases = JSON.parse(stored);
            }
        } catch (e) {
            console.error('Error loading pending cases:', e);
        }
        
        // If no pending cases, create from URL
        if (pendingCases.length === 0 && caseIds.length > 0) {
            pendingCases = caseIds.map((id, i) => ({
                id: id,
                type: 'document_' + (i + 1),
                name: 'Документ ' + (i + 1)
            }));
        }
        
        const caseStates = {};
        let completedCount = 0;
        let failedCount = 0;
        
        function init() {
            renderCasesList();
            startProgressTracking();
        }
        
        function renderCasesList() {
            const container = document.getElementById('casesList');
            container.innerHTML = '';
            
            pendingCases.forEach(caseItem => {
                caseStates[caseItem.id] = {
                    status: 'processing',
                    progress: 0,
                    message: 'В очереди...'
                };
                
                const caseEl = document.createElement('div');
                caseEl.className = 'case-item';
                caseEl.id = `case-${caseItem.id}`;
                caseEl.innerHTML = `
                    <div class="case-info">
                        <h3>${getDocTypeName(caseItem.type)}</h3>
                        <span class="status" id="status-${caseItem.id}">В очереди...</span>
                    </div>
                    <div class="case-actions" id="actions-${caseItem.id}">
                        <div class="spinner"></div>
                    </div>
                `;
                container.appendChild(caseEl);
            });
        }
        
        function getDocTypeName(type) {
            const names = {
                'complaint': 'Исковое заявление',
                'appeal': 'Апелляционная жалоба',
                'petition': 'Досудебная претензия',
                'statement': 'Стратегия защиты',
                'cassation': 'Кассационная жалоба',
                'supervisory': 'Надзорная жалоба'
            };
            return names[type] || type;
        }
        
        async function startProgressTracking() {
            for (const caseItem of pendingCases) {
                await trackCaseProgress(caseItem);
            }
        }
        
        async function trackCaseProgress(caseItem) {
            const maxAttempts = 300; // 5 minutes max
            let attempts = 0;
            
            while (attempts < maxAttempts) {
                try {
                    const response = await fetch(`${API_BASE}/case/${caseItem.id}/progress`, {
                        headers: {'Authorization': 'Bearer ' + token}
                    });
                    
                    if (!response.ok) {
                        await new Promise(r => setTimeout(r, 1000));
                        attempts++;
                        continue;
                    }
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        const state = data.data;
                        updateCaseUI(caseItem.id, state);
                        
                        if (state.status === 'completed' || state.status === 'failed') {
                            break;
                        }
                    }
                    
                    await new Promise(r => setTimeout(r, 1000));
                    attempts++;
                    
                } catch (err) {
                    console.error('Progress tracking error:', err);
                    await new Promise(r => setTimeout(r, 1000));
                    attempts++;
                }
            }
        }
        
        function updateCaseUI(caseId, state) {
            caseStates[caseId] = state;
            
            const caseEl = document.getElementById(`case-${caseId}`);
            const statusEl = document.getElementById(`status-${caseId}`);
            const actionsEl = document.getElementById(`actions-${caseId}`);
            
            if (!caseEl || !statusEl || !actionsEl) return;
            
            statusEl.textContent = `${state.message} (${state.progress}%)`;
            
            if (state.status === 'completed') {
                caseEl.className = 'case-item completed';
                actionsEl.innerHTML = `
                    <a href="${API_BASE}/download/${caseId}?token=${token}" 
                       class="btn btn-primary" 
                       download>
                        📥 Скачать
                    </a>
                `;
                completedCount++;
            } else if (state.status === 'failed') {
                caseEl.className = 'case-item failed';
                actionsEl.innerHTML = `<span style="color: #ef4444;">❌ Ошибка</span>`;
                failedCount++;
            }
            
            updateOverallProgress();
        }
        
        function updateOverallProgress() {
            const total = pendingCases.length;
            const done = completedCount + failedCount;
            const percent = Math.round((done / total) * 100);
            
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = 
                `Обработано ${done} из ${total} документов`;
            document.getElementById('statusText').textContent = 
                done === total ? 'Готово!' : 'Генерация документов...';
            
            if (done === total) {
                document.getElementById('downloadAllContainer').style.display = 'block';
                
                const container = document.getElementById('progressContainer');
                if (failedCount === 0) {
                    container.className = 'success-banner';
                    container.innerHTML = '<h2>✅ Все документы готовы!</h2>';
                } else {
                    container.className = 'error-banner';
                    container.innerHTML = `<h2>⚠️ Готово: ${completedCount}, Ошибок: ${failedCount}</h2>`;
                }
            }
        }
        
        async function downloadAllDocuments() {
            const completedCases = pendingCases.filter(c => caseStates[c.id]?.status === 'completed');
            
            for (const caseItem of completedCases) {
                const link = document.createElement('a');
                link.href = `${API_BASE}/download/${caseItem.id}?token=${token}`;
                link.download = '';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                await new Promise(r => setTimeout(r, 500)); // Delay between downloads
            }
        }
        
        // Start
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генерация документов — Legal AI</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .cases-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }
        .case-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .case-card.completed {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        .case-card.failed {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .case-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        .case-status {
            font-size: 0.9em;
            opacity: 0.8;
        }
        .download-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .spinner-small {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚖️</div>
            <h1>Генерация документов</h1>
            <p class="subtitle" id="mainStatus">Анализируем ваши документы...</p>
        </div>

        <div class="processing-container">
            <div class="processing-progress">
                <div class="progress-header">
                    <span class="progress-label">Общий прогресс</span>
                    <span class="progress-percentage" id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="progress-status" id="progress-status">Подготовка...</div>
            </div>

            <div id="casesContainer" class="cases-container"></div>

            <div class="button-group" id="actionButtons" style="display: none; margin-top: 30px;">
                <button class="btn btn-primary" onclick="downloadAll()">
                    📦 Скачать все документы
                </button>
                <a href="/legal/?v=240" class="btn btn-secondary">
                    ← Новый запрос
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/legal/api';
        
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const caseIdsParam = urlParams.get('cases');
        const token = urlParams.get('token') || localStorage.getItem('token');
        
        // Load cases from localStorage or URL
        let cases = [];
        if (caseIdsParam) {
            const ids = caseIdsParam.split(',');
            const stored = localStorage.getItem('pending_cases');
            if (stored) {
                const storedCases = JSON.parse(stored);
                cases = storedCases.filter(c => ids.includes(String(c.id)));
            }
            if (cases.length === 0) {
                cases = ids.map((id, i) => ({
                    id: id,
                    type: 'document',
                    name: 'Документ ' + (i + 1)
                }));
            }
        }
        
        const caseStates = {};
        let progressInterval = null;
        let checkInterval = null;
        
        function init() {
            renderCases();
            startClientProgress(); // Клиентская анимация прогресса
            startRealStatusCheck(); // Реальные запросы к API
        }
        
        function renderCases() {
            const container = document.getElementById('casesContainer');
            container.innerHTML = '';
            
            cases.forEach((c, i) => {
                caseStates[c.id] = { status: 'processing', progress: 0 };
                
                const card = document.createElement('div');
                card.className = 'case-card';
                card.id = 'case-' + c.id;
                card.innerHTML = `
                    <div class="case-header">
                        <span class="case-title">${getDocTypeName(c.type, i + 1)}</span>
                        <span class="case-status" id="status-${c.id}"><span class="spinner-small"></span>Обработка...</span>
                    </div>
                    <div id="actions-${c.id}"></div>
                `;
                container.appendChild(card);
            });
        }
        
        function getDocTypeName(type, index) {
            const names = {
                'complaint': 'Исковое заявление',
                'appeal': 'Апелляционная жалоба',
                'petition': 'Досудебная претензия',
                'statement': 'Стратегия защиты',
                'cassation': 'Кассационная жалоба',
                'supervisory': 'Надзорная жалоба'
            };
            return names[type] || ('Документ ' + index);
        }
        
        // Клиентская анимация прогресса (как в старой версии)
        function startClientProgress() {
            let progress = 0;
            const stages = [
                { min: 0, max: 30, text: 'Анализируем документы...' },
                { min: 30, max: 60, text: 'Изучаем юридическую практику...' },
                { min: 60, max: 90, text: 'Формируем документ...' },
                { min: 90, max: 100, text: 'Проверяем результат...' }
            ];
            
            progressInterval = setInterval(() => {
                // Увеличиваем прогресс медленнее ближе к 100%
                let increment = 2;
                if (progress > 60) increment = 1;
                if (progress > 85) increment = 0.5;
                
                progress += increment;
                if (progress > 98) progress = 98;
                
                // Находим текущий этап
                let stageText = stages[0].text;
                for (let s of stages) {
                    if (progress >= s.min && progress < s.max) {
                        stageText = s.text;
                        break;
                    }
                }
                
                updateProgressUI(progress, stageText);
                
                // Проверяем, все ли дела завершены
                if (areAllCasesComplete()) {
                    clearInterval(progressInterval);
                    updateProgressUI(100, 'Готово!');
                }
            }, 1000);
        }
        
        function updateProgressUI(progress, text) {
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-percentage').textContent = Math.floor(progress) + '%';
            document.getElementById('progress-status').textContent = text;
        }
        
        // Реальные запросы к API для проверки статуса
        function startRealStatusCheck() {
            checkInterval = setInterval(async () => {
                let allComplete = true;
                
                for (let c of cases) {
                    try {
                        const res = await fetch(`${API_BASE}/case/${c.id}/progress`, {
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        
                        if (!res.ok) continue;
                        
                        const data = await res.json();
                        if (data.success) {
                            updateCaseStatus(c.id, data.data);
                            if (data.data.status !== 'completed' && data.data.status !== 'failed') {
                                allComplete = false;
                            }
                        }
                    } catch (e) {
                        console.error('Status check error:', e);
                    }
                }
                
                if (allComplete && areAllCasesComplete()) {
                    clearInterval(checkInterval);
                    clearInterval(progressInterval);
                    updateProgressUI(100, 'Все документы готовы!');
                    document.getElementById('mainStatus').textContent = '✅ Готово!';
                    document.getElementById('actionButtons').style.display = 'block';
                }
            }, 2000); // Проверяем каждые 2 секунды
        }
        
        function updateCaseStatus(caseId, data) {
            caseStates[caseId] = data;
            
            const card = document.getElementById('case-' + caseId);
            const statusEl = document.getElementById('status-' + caseId);
            const actionsEl = document.getElementById('actions-' + caseId);
            
            if (!card || !statusEl) return;
            
            if (data.status === 'completed') {
                card.className = 'case-card completed';
                statusEl.innerHTML = '✅ Готово';
                actionsEl.innerHTML = `
                    <a href="${API_BASE}/download/${caseId}?token=${token}" 
                       class="download-btn" download>
                        📥 Скачать документ
                    </a>
                `;
            } else if (data.status === 'failed') {
                card.className = 'case-card failed';
                statusEl.innerHTML = '❌ Ошибка';
            } else {
                statusEl.innerHTML = `<span class="spinner-small"></span>${data.progress_message || 'Обработка...'} (${data.progress}%)`;
            }
        }
        
        function areAllCasesComplete() {
            return Object.values(caseStates).every(s => s.status === 'completed' || s.status === 'failed');
        }
        
        function downloadAll() {
            cases.forEach((c, i) => {
                if (caseStates[c.id]?.status === 'completed') {
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = `${API_BASE}/download/${c.id}?token=${token}`;
                        link.download = '';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, i * 500);
                }
            });
        }
        
        // Start
        init();
    </script>
</body>
</html>

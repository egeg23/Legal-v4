<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документ готов - Legal AI</title>
    <link rel="stylesheet" href="/legal/static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .download-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
        }
        .download-title {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 16px;
        }
        .download-subtitle {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 40px;
        }
        .document-card {
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
        }
        .document-icon {
            width: 48px;
            height: 48px;
            background: #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .document-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .document-info {
            font-size: 14px;
            color: #6b7280;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .secondary-actions {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn-secondary {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .btn-secondary:hover {
            color: #3b82f6;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="download-container">
        <div class="success-icon">✓</div>
        <h1 class="download-title">Документ готов!</h1>
        <p class="download-subtitle">Ваш юридический документ успешно сгенерирован</p>
        
        <div class="document-card">
            <div class="document-icon">📄</div>
            <div class="document-name" id="docName">Юридический документ</div>
            <div class="document-info">
                Формат: Microsoft Word (.docx)<br>
                Статус: <span id="docStatus">Готов к скачиванию</span>
            </div>
        </div>
        
        <button class="download-btn" id="downloadBtn" onclick="downloadDocument()">
            📥 Скачать документ
        </button>
        
        <div class="secondary-actions">
            <a href="/legal/?v=360" class="btn-secondary">Создать ещё документ</a>
        </div>
    </div>

    <script>
        // Get case_id from URL
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('case_id');
        const token = urlParams.get('token') || localStorage.getItem('token');
        
        const API_BASE = window.location.origin + '/legal/api';
        
        if (!caseId) {
            document.getElementById('docName').textContent = 'Ошибка: документ не найден';
            document.getElementById('downloadBtn').style.display = 'none';
        }
        
        if (!token) {
            document.getElementById('docStatus').textContent = 'Требуется авторизация';
        }
        
        async function downloadDocument() {
            if (!caseId) {
                alert('Ошибка: ID документа не указан');
                return;
            }
            
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerHTML;
            
            // Show loading
            btn.innerHTML = '<span class="loading"></span> Скачивание...';
            btn.disabled = true;
            
            try {
                console.log('Downloading case', caseId);
                
                // Use query string token for compatibility
                const response = await fetch(`${API_BASE}/download/${caseId}?token=${token}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Download failed:', response.status, errorText);
                    throw new Error('Ошибка ' + response.status);
                }
                
                const blob = await response.blob();
                console.log('Blob received:', blob.size, 'bytes');
                
                if (blob.size === 0) {
                    throw new Error('Пустой файл');
                }
                
                // Universal download
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `document_case_${caseId}.docx`;
                document.body.appendChild(a);
                
                // Trigger download
                a.click();
                
                // Cleanup
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                
                // Show success
                btn.innerHTML = '✅ Скачано!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('Download error:', error);
                btn.innerHTML = '❌ ' + error.message;
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 3000);
            }
        }
    </script>
</body>
</html>

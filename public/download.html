<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документ готов - Legal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .download-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: white;
        }
        .download-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .download-subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 32px;
        }
        .document-card {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .document-icon {
            width: 48px;
            height: 48px;
            background: #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .document-name {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }
        .document-info {
            font-size: 14px;
            color: #6b7280;
        }
        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="download-container">
        <div class="success-icon" id="successIcon">✓</div>
        <h1 class="download-title" id="title">Документ готов!</h1>
        <p class="download-subtitle" id="subtitle">Ваш юридический документ успешно сгенерирован</p>
        
        <div class="document-card" id="docCard" style="display: none;">
            <div class="document-icon">📄</div>
            <div class="document-name" id="docName">Юридический документ</div>
            <div class="document-info">
                Формат: Microsoft Word (.docx)
            </div>
        </div>
        
        <div id="downloadSection">
            <a href="#" class="download-link" id="directDownloadLink" download>
                📥 Скачать документ
            </a>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('case_id');
        const token = urlParams.get('token') || localStorage.getItem('token');
        
        const API_BASE = window.location.origin + '/legal/api';
        
        if (!caseId) {
            document.getElementById('title').textContent = 'Ошибка';
            document.getElementById('subtitle').textContent = 'ID документа не указан';
            document.getElementById('successIcon').textContent = '✗';
            document.getElementById('successIcon').style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            document.getElementById('downloadSection').style.display = 'none';
        } else if (!token) {
            document.getElementById('title').textContent = 'Требуется авторизация';
            document.getElementById('subtitle').textContent = 'Пожалуйста, войдите снова';
            document.getElementById('successIcon').textContent = '🔒';
            document.getElementById('downloadSection').style.display = 'none';
        } else {
            // Set direct download link - this uses browser's native download
            const downloadUrl = `${API_BASE}/download/${caseId}?token=${token}`;
            const link = document.getElementById('directDownloadLink');
            link.href = downloadUrl;
            
            // Also try to auto-trigger download on page load (after short delay)
            setTimeout(() => {
                console.log('Auto-triggering download...');
                window.location.href = downloadUrl;
            }, 1000);
            
            // Show document card
            document.getElementById('docCard').style.display = 'block';
            document.getElementById('docName').textContent = `Документ по делу №${caseId}`;
        }
    </script>
</body>
</html>

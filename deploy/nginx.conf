# Legal AI Service - Nginx Configuration
# Place this file in /etc/nginx/sites-available/legal-ai
# Then create symlink: ln -s /etc/nginx/sites-available/legal-ai /etc/nginx/sites-enabled/

upstream legal_ai_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name legal-ai-service.local;
    
    # For Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name legal-ai-service.local;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/legal-ai-service.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legal-ai-service.local/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/legal-ai-service.local/chain.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

    # Logging
    access_log /var/log/nginx/legal-ai-access.log;
    error_log /var/log/nginx/legal-ai-error.log;

    # Client body size for file uploads
    client_max_body_size 50M;

    # Static files
    location /static/ {
        alias /var/www/legal-ai-service/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Uploads directory
    location /uploads/ {
        alias /var/www/legal-ai-service/uploads/;
        expires 7d;
        add_header Cache-Control "private";
        internal;
    }

    # Proxy to Flask application
    location / {
        proxy_pass http://legal_ai_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://legal_ai_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

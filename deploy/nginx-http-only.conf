# Legal AI Service - Nginx Configuration (HTTP ONLY - for local/testing)
# Use this if you don't have a domain or SSL certificate
# Place this file in /etc/nginx/sites-available/legal-ai
# Then create symlink: ln -s /etc/nginx/sites-available/legal-ai /etc/nginx/sites-enabled/

upstream legal_ai_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Accept any server name

    # Logging
    access_log /var/log/nginx/legal-ai-access.log;
    error_log /var/log/nginx/legal-ai-error.log;

    # Client body size for file uploads
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location /static/ {
        alias /var/www/legal-ai-service/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Uploads directory
    location /uploads/ {
        alias /var/www/legal-ai-service/uploads/;
        expires 7d;
        add_header Cache-Control "private";
        internal;
    }

    # Proxy to Flask application
    location / {
        proxy_pass http://legal_ai_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://legal_ai_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
